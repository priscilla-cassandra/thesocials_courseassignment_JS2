<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Browse through all posts of a single profile, either your profile or another users profile"
    />
    <link rel="stylesheet" href="../css/global.css" />
    <link rel="stylesheet" href="../css/profile.css" />
    <link rel="stylesheet" href="../css/nav.css" />
    <link rel="stylesheet" href="/css/search.css" />
    <link rel="stylesheet" href="/css/buttons.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <script
      src="https://kit.fontawesome.com/0c657a5b56.js"
      crossorigin="anonymous"
    ></script>
    <title>Profile | The Socials</title>
  </head>
  <body>
    <h1>The Socials</h1>
    <form class="search-bar" id="search-for-posts">
      <label for="site-search">Search for posts</label>
      <input
        type="search"
        id="site-search"
        name="site-search"
        placeholder="Search..."
      />
    </form>
    <section id="search-result"></section>
    <h2 id="username"></h2>
    <button id="follow-btn" class="follow-button hidden">Follow</button>
    <nav id="sidebar-navigation" class="navbar"></nav>
    <section id="profile-post-grid"></section>
    <script type="module" src="../src/profile/user-profile.js"></script>
    <script type="module" src="/src/search/search.js"></script>
  </body>
</html>
