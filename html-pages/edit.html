<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Create a new social media post for your profile on The Socials"
    />
    <link rel="stylesheet" href="../css/global.css" />
    <link rel="stylesheet" href="../css/forms.css" />
    <link rel="stylesheet" href="../css/nav.css" />
    <link rel="stylesheet" href="/css/post-edits.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <script
      src="https://kit.fontawesome.com/0c657a5b56.js"
      crossorigin="anonymous"
    ></script>
    <title>New Post | The Socials</title>
  </head>
  <body>
    <h1>The Socials</h1>
    <h2>Edit post</h2>
    <nav id="sidebar-navigation" class="navbar"></nav>
    <form id="edit-form">
      <section class="form-field">
        <label for="imageURL">Upload image</label>
        <input
          type="url"
          id="edit-imageURL"
          name="imageURL"
          placeholder="Paste image URL"
        />
      </section>
      <section class="form-field">
        <label for="title">Title</label>
        <input
          type="text"
          id="edit-title"
          name="title"
          placeholder="Title of your post"
          required
        />
      </section>
      <section class="form-field">
        <label for="caption">Caption</label>
        <textarea
          id="edit-caption"
          name="caption"
          placeholder="Write a descriptive caption about your post!"
          rows="10"
        ></textarea>
      </section>
      <button type="submit" id="update-post-button" class="update-button">
        Update
      </button>
      <button type="button" id="delete-post-button">Delete</button>
    </form>
    <p id="update-post-message"></p>
    <script type="module" src="/src/profile/edit.js"></script>
    <script type="module" src="/src/nav/nav.js"></script>
  </body>
</html>
