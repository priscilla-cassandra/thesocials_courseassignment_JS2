<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Create a new social media post for your profile on The Socials"
    />
    <link rel="stylesheet" href="../css/global.css" />
    <link rel="stylesheet" href="../css/forms.css" />
    <title>New Post | The Socials</title>
  </head>
  <body>
    <h1>The Socials</h1>
    <h2>Edit post</h2>
    <form id="edit-post">
      <section class="form-field">
        <label for="imageURL">Upload image</label>
        <input
          type="url"
          id="imageURL"
          name="imageURL"
          placeholder="Paste image URL"
        />
      </section>
      <section class="form-field">
        <label for="title">Title</label>
        <input
          type="text"
          id="title"
          name="title"
          placeholder="Title of your post"
          required
        />
      </section>
      <section class="form-field">
        <label for="caption">Caption</label>
        <textarea
          id="caption"
          name="caption"
          placeholder="Write a descriptive caption about your post!"
          rows="10"
        ></textarea>
      </section>
      <button type="submit" id="update-post-button">Update</button>
    </form>
  </body>
</html>
