<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="To start browsing The Socials, please create a new user or log in"
    />
    <link rel="stylesheet" href="../css/global.css" />
    <link rel="stylesheet" href="../css/forms.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <title>Register | The Socials</title>
  </head>
  <body>
    <h1>The Socials</h1>
    <form id="register-form">
      <section class="form-field">
        <label for="name">Username</label>
        <input type="text" id="name" name="name" required />
      </section>
      <section class="form-field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required />
      </section>
      <section class="form-field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required />
      </section>
      <button type="submit">Create user</button>
    </form>
    <section>
      <p id="success-error-message"></p>
    </section>
    <section id="">
      <p>or</p>
      <a href="../index.html">Log in</a>
    </section>
    <script type="module" src="../src/pages/register.js"></script>
  </body>
</html>
