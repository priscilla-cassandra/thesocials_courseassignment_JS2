<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="To start browsing The Socials, please log in or create a user"
    />
    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/forms.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <title>Log in | The Socials</title>
  </head>
  <body>
    <h1>The Socials</h1>
    <form id="login-form" class="loginform">
      <section class="form-field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required />
      </section>
      <section class="form-field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required />
      </section>
      <button type="submit">Log in</button>
    </form>
    <section>
      <p id="error-message"></p>
    </section>
    <section id="">
      <p>or</p>
      <a href="./html-pages/register.html">Register new user</a>
    </section>
    <script type="module" src="./src/pages/login.js"></script>
  </body>
</html>
